openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Bot Quà Tặng AI Admin API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot administration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/auth:
    post:
      operationId: botLogin
      tags: [bot]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Unauthorized

  /bot/stats:
    get:
      operationId: getBotStats
      tags: [bot]
      summary: Dashboard statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"

  /bot/settings:
    get:
      operationId: getBotSettings
      tags: [bot]
      summary: Get bot settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    put:
      operationId: updateBotSettings
      tags: [bot]
      summary: Update bot settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"

  /bot/accounts:
    get:
      operationId: listAccounts
      tags: [bot]
      summary: List all accounts in stock
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: addAccounts
      tags: [bot]
      summary: Add accounts to stock (bulk)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountsInput"
      responses:
        "200":
          description: Add result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddAccountsResult"

  /bot/accounts/{email}:
    put:
      operationId: updateAccount
      tags: [bot]
      summary: Update an account
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
    delete:
      operationId: deleteAccount
      tags: [bot]
      summary: Delete account from stock
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
        "404":
          description: Not found

  /bot/users:
    get:
      operationId: listUsers
      tags: [bot]
      summary: List all bot users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotUser"

  /bot/users/{userId}/ban:
    post:
      operationId: banUser
      tags: [bot]
      summary: Ban a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/users/{userId}/unban:
    post:
      operationId: unbanUser
      tags: [bot]
      summary: Unban a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/users/{userId}/reset-gift:
    post:
      operationId: resetUserGift
      tags: [bot]
      summary: Reset a user gift claim so they can receive again
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/logs:
    get:
      operationId: getBotLogs
      tags: [bot]
      summary: Get recent activity logs
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"

  /bot/receivers:
    get:
      operationId: getReceivers
      tags: [bot]
      summary: Get users who claimed gift this round
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Receivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClaimRecord"

  /bot/broadcast:
    post:
      operationId: queueBroadcast
      tags: [bot]
      summary: Queue a broadcast message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "200":
          description: Queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/round:
    post:
      operationId: newRound
      tags: [bot]
      summary: Start a new giveaway round
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewRoundInput"
      responses:
        "200":
          description: Round started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/orders:
    get:
      operationId: listOrders
      tags: [bot]
      summary: List all orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [bot]
      summary: Create a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /bot/orders/{orderId}:
    get:
      operationId: getOrder
      tags: [bot]
      summary: Get a single order
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    put:
      operationId: updateOrder
      tags: [bot]
      summary: Update an order
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
    delete:
      operationId: deleteOrder
      tags: [bot]
      summary: Delete an order
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/warranty:
    get:
      operationId: listWarranty
      tags: [bot]
      summary: List all warranty requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Warranty requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WarrantyRequest"

  /bot/warranty/{id}/replacement:
    post:
      operationId: resolveWarrantyReplacement
      tags: [bot]
      summary: Resolve warranty by sending replacement account
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarrantyReplacementInput"
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/warranty/{id}/refund:
    post:
      operationId: resolveWarrantyRefund
      tags: [bot]
      summary: Resolve warranty by refund
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarrantyRefundInput"
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/warranty/{id}/reject:
    post:
      operationId: resolveWarrantyReject
      tags: [bot]
      summary: Reject a warranty request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarrantyRejectInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/notification-settings:
    get:
      operationId: getNotificationSettings
      tags: [bot]
      summary: Get admin notification settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
    put:
      operationId: updateNotificationSettings
      tags: [bot]
      summary: Update admin notification settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"

  /bot/warranty/{id}/accounts/{accId}/replacement:
    post:
      operationId: resolveWarrantyAccountReplacement
      tags: [bot]
      summary: Send replacement account for a sub-item in a group warranty
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: accId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarrantyAccountReplacementInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/warranty/{id}/accounts/{accId}/refund:
    post:
      operationId: resolveWarrantyAccountRefund
      tags: [bot]
      summary: Refund a sub-item in a group warranty
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: accId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarrantyRefundInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/warranty/{id}/accounts/{accId}/reject:
    post:
      operationId: resolveWarrantyAccountReject
      tags: [bot]
      summary: Reject a sub-item in a group warranty
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: accId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarrantyRejectInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/warranty/{id}/accounts/{accId}/resend:
    post:
      operationId: resendWarrantyAccountReplacement
      tags: [bot]
      summary: Resend replacement account message for a sub-item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: accId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/warranty/{id}/resend-ack:
    post:
      operationId: resendWarrantyAckNotif
      tags: [bot]
      summary: Resend "request acknowledged" notification to customer
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/warranty/{id}/resend:
    post:
      operationId: resendWarrantyReplacement
      tags: [bot]
      summary: Retry sending replacement account to user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/intro:
    get:
      operationId: getIntro
      tags: [bot]
      summary: Get introduction page config
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Intro config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntroConfig"
    put:
      operationId: updateIntro
      tags: [bot]
      summary: Update introduction page config
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntroConfig"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /bot/backup:
    get:
      operationId: getBackup
      tags: [bot]
      summary: Download a full JSON backup of all data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Backup JSON
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    LoginResult:
      type: object
      required: [token]
      properties:
        token:
          type: string

    BotStats:
      type: object
      required: [totalUsers, stock, claimed, banned, roundId, totalOrders, warrantyPending, warrantyResolved, warrantyRejected]
      properties:
        totalUsers:
          type: integer
        stock:
          type: integer
        claimed:
          type: integer
        banned:
          type: integer
        roundId:
          type: string
        totalOrders:
          type: integer
        warrantyPending:
          type: integer
        warrantyProcessing:
          type: integer
        warrantyResolved:
          type: integer
        warrantyRejected:
          type: integer
        warrantyOverdue:
          type: integer

    NotificationSettings:
      type: object
      properties:
        enabled:
          type: boolean
        adminIds:
          type: array
          items:
            type: string
        reminderEnabled:
          type: boolean
        reminder1Minutes:
          type: integer
        reminder2Minutes:
          type: integer
        urgentMinutes:
          type: integer

    BotSettings:
      type: object
      properties:
        shopLink:
          type: string
        shopUsername:
          type: string
        supportUsername:
          type: string
        cooldownHours:
          type: integer
        roundId:
          type: string
        giftEnabled:
          type: boolean
        supportEnabled:
          type: boolean
        introEnabled:
          type: boolean
        maintenanceMode:
          type: boolean
        refundFormula:
          type: string
        refundCustomText:
          type: string

    BotSettingsInput:
      type: object
      properties:
        shopLink:
          type: string
        shopUsername:
          type: string
        supportUsername:
          type: string
        cooldownHours:
          type: integer
        roundId:
          type: string
        giftEnabled:
          type: boolean
        supportEnabled:
          type: boolean
        introEnabled:
          type: boolean
        maintenanceMode:
          type: boolean
        refundFormula:
          type: string
        refundCustomText:
          type: string

    Account:
      type: object
      required: [email, password]
      properties:
        id:
          type: string
        type:
          type: string
        email:
          type: string
        password:
          type: string
        note:
          type: string
        addedAt:
          type: string
        status:
          type: string
        distributedTo:
          type: string
          nullable: true
        distributedAt:
          type: string
          nullable: true

    AccountsInput:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/Account"

    AccountUpdateInput:
      type: object
      properties:
        type:
          type: string
        password:
          type: string
        note:
          type: string
        status:
          type: string

    AddAccountsResult:
      type: object
      required: [added, total]
      properties:
        added:
          type: integer
        total:
          type: integer

    BotUser:
      type: object
      required: [userId, username, firstName, startedAt, banned]
      properties:
        userId:
          type: string
        username:
          type: string
        firstName:
          type: string
        startedAt:
          type: string
        lastActive:
          type: string
        usageCount:
          type: integer
        hasReceivedGift:
          type: boolean
        giftReceived:
          type: string
          nullable: true
        banned:
          type: boolean

    LogEntry:
      type: object
      required: [time, action, user]
      properties:
        time:
          type: string
        action:
          type: string
        user:
          type: string
        admin:
          type: string

    ClaimRecord:
      type: object
      required: [userId, username, firstName, claimTime, accountEmail, roundId]
      properties:
        userId:
          type: string
        username:
          type: string
        firstName:
          type: string
        claimTime:
          type: string
        accountEmail:
          type: string
        roundId:
          type: string

    BroadcastInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
        target:
          type: string
          description: "all | has_received | no_received"

    NewRoundInput:
      type: object
      required: [roundId]
      properties:
        roundId:
          type: string

    ActionResult:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
        message:
          type: string

    Order:
      type: object
      required: [orderId, email, productName, status]
      properties:
        orderId:
          type: string
        email:
          type: string
        productName:
          type: string
        price:
          type: number
          nullable: true
        costPrice:
          type: number
          nullable: true
        purchaseDate:
          type: string
          nullable: true
        usagePeriod:
          type: string
          nullable: true
        warrantyPeriod:
          type: string
          nullable: true
        warrantyExpiry:
          type: string
          nullable: true
        expiryDate:
          type: string
          nullable: true
        status:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true

    OrderInput:
      type: object
      required: [email, productName]
      properties:
        orderId:
          type: string
        email:
          type: string
        productName:
          type: string
        price:
          type: number
          nullable: true
        costPrice:
          type: number
          nullable: true
        purchaseDate:
          type: string
          nullable: true
        usagePeriod:
          type: string
          nullable: true
        warrantyPeriod:
          type: string
          nullable: true
        warrantyExpiry:
          type: string
          nullable: true
        expiryDate:
          type: string
          nullable: true
        status:
          type: string
        notes:
          type: string
          nullable: true

    WarrantyAccount:
      type: object
      required: [id, orderId, email, status]
      properties:
        id:
          type: string
        orderId:
          type: string
        email:
          type: string
        productName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        status:
          type: string
        resolution:
          type: string
          nullable: true
        replacementEmail:
          type: string
          nullable: true
        replacementPassword:
          type: string
          nullable: true
        replacementTwoFA:
          type: string
          nullable: true
        replacementNote:
          type: string
          nullable: true
        sentStatus:
          type: string
          nullable: true
        sentError:
          type: string
          nullable: true
        sentAt:
          type: string
          nullable: true
        resolvedAt:
          type: string
          nullable: true
        resolvedBy:
          type: string
          nullable: true

    WarrantyAccountReplacementInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        twoFA:
          type: string
        note:
          type: string

    WarrantyRequest:
      type: object
      required: [id, userId, description, submittedAt, status]
      properties:
        id:
          type: string
        type:
          type: string
          nullable: true
        userId:
          type: string
        username:
          type: string
